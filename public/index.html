<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="FluentAI — Aprenda inglês do zero ao avançado com IA adaptativa"/>
<title>FluentAI — English Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:#08080f;color:#e2e0f0;min-height:100vh;line-height:1.5}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#2d2a40;border-radius:2px}
#app{display:flex;flex-direction:column;min-height:100vh}
.header{background:#060610;border-bottom:1px solid #1a1828;padding:0 20px;position:sticky;top:0;z-index:100}
.header-inner{max-width:920px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px;gap:8px}
.logo{display:flex;align-items:center;gap:9px;cursor:pointer}
.logo-icon{width:30px;height:30px;background:#5b21b6;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#e9d5ff;flex-shrink:0}
.logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:#e2e0f0;letter-spacing:-0.02em}
.logo-text span{color:#a78bfa}
.header-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.level-select{background:#111118;border:1px solid #2d2a40;color:#a78bfa;padding:4px 9px;border-radius:8px;font-size:12px;font-family:inherit;outline:none;cursor:pointer}
.streak-pill{display:flex;align-items:center;gap:5px;background:#1e1a2e;border-radius:8px;padding:4px 10px;font-size:13px;font-weight:700;color:#fcd34d}
.xp-pill{font-size:12px;color:#888;background:#111118;padding:4px 10px;border-radius:8px;border:1px solid #1e1e2a}
.user-pill{font-size:12px;color:#a78bfa;background:#1a1630;padding:4px 10px;border-radius:8px;border:1px solid #2d2a40;cursor:pointer}
.tabs{background:#060610;border-bottom:1px solid #1a1828;padding:0 20px;overflow-x:auto}
.tabs-inner{max-width:920px;margin:0 auto;display:flex;gap:2px;padding:5px 0}
.tab{background:none;border:none;cursor:pointer;padding:7px 11px;border-radius:9px;color:#555;font-size:11px;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.tab:hover{color:#bbb;background:#14121e}
.tab.active{color:#a78bfa;background:#1a1630;font-weight:500}
.main{flex:1;padding:22px 20px 40px}
.content{max-width:920px;margin:0 auto}
.card{background:#0f0f1a;border:1px solid #1a1828;border-radius:14px;padding:20px;margin-bottom:14px}
.page-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px}
.page-sub{font-size:13px;color:#6b7280;margin-bottom:20px}
.btn{border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px;font-size:14px;padding:9px 18px}
.btn:active{transform:scale(.97)}
.btn-primary{background:#5b21b6;color:#e9d5ff}.btn-primary:hover{background:#6d28d9}
.btn-secondary{background:#141222;color:#a78bfa;border:1px solid #2d2a40;font-size:13px;padding:7px 14px}.btn-secondary:hover{background:#1e1a2e}
.btn-success{background:#064e3b;color:#6ee7b7}.btn-success:hover{background:#065f46}
.btn-easy{background:#064e3b;color:#6ee7b7;flex:1;justify-content:center}
.btn-medium{background:#451a03;color:#fcd34d;flex:1;justify-content:center}
.btn-hard{background:#1f0e0e;color:#f87171;border:1px solid #450a0a;flex:1;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-sm{font-size:12px;padding:5px 12px}
.progress-wrap{background:#141222;border-radius:99px;overflow:hidden;height:6px}
.progress-bar{height:100%;border-radius:99px;background:#7c3aed;transition:width .5s ease}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:#0c0c18;border:1px solid #1a1828;border-radius:12px;padding:14px;text-align:center}
.stat-val{font-size:20px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:#a78bfa}
.stat-label{font-size:11px;font-weight:500;margin-top:3px;color:#ccc}
.stat-sub{font-size:10px;color:#555;margin-top:1px}
.mission-item{display:flex;align-items:center;gap:12px;padding:12px 15px;border-radius:12px;background:#0c0c18;border:1px solid #1a1828;margin-bottom:8px;transition:all .2s}
.mission-item.done{border-color:#065f46;background:#031710}
.check-circle{width:22px;height:22px;border-radius:50%;border:2px solid #2d2a40;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;cursor:pointer;transition:all .2s;color:transparent}
.check-circle.done{background:#059669;border-color:#059669;color:#fff}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.badge-purple{background:#1e1a2e;color:#a78bfa}
.badge-green{background:#064e3b;color:#6ee7b7}
.badge-amber{background:#451a03;color:#fcd34d}
.badge-blue{background:#0c2740;color:#60a5fa}
.perf-bar{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.perf-label{width:82px;font-size:12px;color:#888}
.perf-pct{width:30px;font-size:12px;color:#666;text-align:right}
.flashcard{background:#0f0f1a;border:1px solid #2d2a40;border-radius:16px;min-height:175px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color .25s;padding:26px;text-align:center;margin-bottom:14px;user-select:none}
.flashcard:hover{border-color:#5b21b6}
.chat-area{overflow-y:auto;background:#07070f;border-radius:13px;border:1px solid #1a1828;padding:14px;min-height:220px;max-height:380px;display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.bubble{max-width:84%;padding:10px 14px;border-radius:13px;font-size:13px;line-height:1.65;white-space:pre-wrap;word-break:break-word;position:relative}
.bubble-user{background:#1e1a2e;color:#c4b5fd;border-bottom-right-radius:4px;align-self:flex-end}
.bubble-ai{background:#0f0f1a;border:1px solid #1a1828;color:#e2e0f0;border-bottom-left-radius:4px;align-self:flex-start}
.bubble-speak-btn{position:absolute;bottom:6px;right:8px;background:none;border:none;cursor:pointer;font-size:13px;color:#555;padding:2px 4px;border-radius:4px;transition:color .2s}
.bubble-speak-btn:hover{color:#a78bfa}
.voice-btn{width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;flex-shrink:0}
.voice-idle{background:#141222;color:#888;border:1px solid #2d2a40}.voice-idle:hover{background:#1e1a2e;color:#a78bfa}
.voice-recording{background:#7c3aed;color:#fff;animation:vp 1.2s infinite}
@keyframes vp{0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,.5)}50%{box-shadow:0 0 0 8px rgba(124,58,237,0)}}
.inp{background:#0c0c18;border:1px solid #2d2a40;border-radius:10px;color:#e2e0f0;font-family:inherit;font-size:13px;padding:10px 13px;width:100%;outline:none;resize:vertical}
.inp:focus{border-color:#5b21b6}
.inp-number{background:#0c0c18;border:1px solid #2d2a40;border-radius:10px;color:#e2e0f0;font-family:inherit;font-size:13px;padding:8px 12px;outline:none;width:90px}
.inp-number:focus{border-color:#5b21b6}
.success-box{background:#031710;border:1px solid #065f46;border-radius:10px;padding:13px;margin-top:10px}
.word-of-day{background:#0f0f1a;border:1px solid #3d1d6b;border-radius:14px;padding:20px;margin-bottom:14px}
.onboarding-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;overflow-y:auto}
.onboarding-card{background:#0f0f1a;border:1px solid #2d2a40;border-radius:20px;padding:30px;max-width:460px;width:100%}
.levels-row{display:flex;justify-content:space-between;margin-top:10px}
.level-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.level-dot{width:9px;height:9px;border-radius:50%}
.text-box{background:#07070f;border:1px solid #1a1828;border-radius:10px;padding:14px;line-height:1.8;font-size:14px;color:#c4b5fd;margin-bottom:12px}
.chunk-item{display:flex;align-items:center;gap:10px;padding:9px 13px;background:#0c0c18;border-radius:10px;border:1px solid #1a1828;margin-bottom:7px}
.review-card{background:#0f0f1a;border:1px solid #2d2a40;border-radius:16px;min-height:155px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;margin-bottom:14px;cursor:pointer;transition:border-color .2s}
.review-card:hover{border-color:#5b21b6}
.srs-info{background:#07070f;border-radius:10px;padding:14px;margin-bottom:14px;border:1px solid #1a1828}
.topic-btn{background:#141222;border:1px solid #2d2a40;color:#a78bfa;border-radius:8px;padding:6px 12px;font-size:11px;font-family:inherit;cursor:pointer;transition:all .2s}
.topic-btn:hover{background:#1e1a2e;border-color:#5b21b6}
.topic-btn.sel{background:#1e1a2e;border-color:#7c3aed;color:#c4b5fd}
.speed-btn{background:#141222;border:1px solid #2d2a40;color:#888;border-radius:6px;padding:4px 10px;font-size:11px;font-family:inherit;cursor:pointer;transition:all .2s}
.speed-btn:hover{color:#a78bfa}.speed-btn.sel{background:#1e1a2e;border-color:#5b21b6;color:#a78bfa}
.goal-btn{background:#141222;border:1px solid #2d2a40;color:#888;border-radius:8px;padding:8px 14px;font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s;text-align:center}
.goal-btn:hover{color:#a78bfa;border-color:#5b21b6}.goal-btn.sel{background:#1e1a2e;border-color:#7c3aed;color:#a78bfa}
.timer-bar{background:#141222;border-radius:99px;overflow:hidden;height:4px;margin-top:6px}
.timer-fill{height:100%;border-radius:99px;background:#a78bfa;transition:width 1s linear}
.celebrate{background:#1a1630;border:1px solid #5b21b6;border-radius:14px;padding:22px;text-align:center;margin-bottom:14px}
.filter-btn{background:#141222;border:1px solid #2d2a40;color:#888;border-radius:8px;padding:5px 12px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s}
.filter-btn:hover{color:#a78bfa;border-color:#5b21b6}.filter-btn.sel{background:#1e1a2e;border-color:#7c3aed;color:#a78bfa}
.activity-day{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#555;flex-direction:column;gap:1px}
.lesson-step{background:#0c0c18;border:1px solid #1a1828;border-radius:12px;padding:14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:all .2s}
.lesson-step.active{border-color:#5b21b6;background:#0f0a1e}
.lesson-step.done{border-color:#065f46;background:#031710}
/* ── Speaking Feedback (melhorado) ── */
.fb-card{border-radius:12px;overflow:hidden;margin-bottom:10px}
.fb-main{padding:13px 15px;cursor:default}
.fb-label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.fb-text{font-size:13px;line-height:1.7;color:#e2e0f0;white-space:pre-wrap}
.fb-toggle{width:100%;background:#0a0a15;border:none;border-top:1px solid #1a1828;color:#6b7280;font-size:11px;padding:8px 15px;cursor:pointer;text-align:left;font-family:inherit;transition:color .2s}
.fb-toggle:hover{color:#a78bfa}
.fb-details{background:#07070f;border-top:1px solid #1a1828;padding:13px 15px;display:none}
.fb-details.open{display:block}
.fb-detail-row{margin-bottom:10px}
.fb-detail-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.fb-detail-text{font-size:12px;line-height:1.7;color:#d1d5db;white-space:pre-wrap}
.fb-speak-btn{background:none;border:1px solid #2d2a40;color:#a78bfa;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;margin-top:8px;font-family:inherit}
.fb-speak-btn:hover{background:#1a1630}
.fb-followup{background:#0f0a1e;border:1px solid #3d1d6b;border-radius:10px;padding:12px 14px;margin-top:8px}
.fb-followup-label{font-size:10px;font-weight:700;color:#a78bfa;letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.fb-followup-text{font-size:13px;color:#c4b5fd;line-height:1.6}

/* ── Loading skeleton ── */
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.skeleton{background:#141222;border-radius:8px;overflow:hidden;position:relative}
.skeleton::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,#1e1a2e 50%,transparent 100%);background-size:600px 100%;animation:shimmer 1.4s infinite}
.sk-title{height:26px;width:55%;margin-bottom:10px}
.sk-sub{height:14px;width:38%;margin-bottom:24px}
.sk-card{background:#0f0f1a;border:1px solid #1a1828;border-radius:14px;padding:20px;margin-bottom:14px}
.sk-row{display:flex;gap:10px;margin-bottom:12px}
.sk-stat{flex:1;height:80px;border-radius:12px}
.sk-bar{height:14px;border-radius:99px;margin-bottom:10px}
.sk-bar-short{width:40%}
.sk-bar-mid{width:65%}
.sk-bar-long{width:85%}
#content{opacity:0;transition:opacity .25s ease}
#content.ready{opacity:1}
.tab-icon{font-size:13px;line-height:1}
.tab-label{font-size:11px}
@media(max-width:600px){.stats-grid{grid-template-columns:repeat(2,1fr)}.tab{font-size:10px;padding:6px 8px}.page-title{font-size:18px}.stat-val{font-size:17px}.header-right{gap:5px}}
@media(max-width:480px){
  .tabs{padding:0 8px}
  .tabs-inner{gap:1px;padding:4px 0}
  .tab{padding:8px 9px;border-radius:8px;flex-direction:column;gap:2px;min-width:44px;min-height:44px;justify-content:center}
  .tab-label{display:none}
  .tab-icon{font-size:16px}
  .tab.active .tab-label{display:block;font-size:9px;color:#a78bfa;font-weight:600;letter-spacing:.02em;margin-top:1px}
  .header-right{gap:4px}
  .level-select{font-size:11px;padding:3px 6px}
  .xp-pill{display:none}
  .main{padding:16px 12px 32px}
}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="header-inner">
      <div class="logo" onclick="showTab('dashboard')">
        <div class="logo-icon">F</div>
        <span class="logo-text">fluent<span>ai</span></span>
      </div>
      <div class="header-right">
        <select class="level-select" id="levelSelect" onchange="onLevelChange(this.value)">
          <option>Beginner</option><option>Basic</option><option>Pre-Intermediate</option>
          <option>Intermediate</option><option>Upper-Intermediate</option><option>Advanced</option>
        </select>
        <div class="streak-pill">🔥 <span id="streakVal">0</span></div>
        <div class="xp-pill">✦ <span id="xpVal">0</span> XP</div>
        <div class="user-pill" id="userPill" onclick="showTab('settings')">⚙</div>
      </div>
    </div>
  </header>
  <nav class="tabs"><div class="tabs-inner" id="tabsInner"></div></nav>
  <main class="main"><div class="content" id="content">
  <div class="sk-title skeleton"></div>
  <div class="sk-sub skeleton"></div>
  <div class="sk-row">
    <div class="sk-stat skeleton"></div>
    <div class="sk-stat skeleton"></div>
    <div class="sk-stat skeleton"></div>
    <div class="sk-stat skeleton"></div>
  </div>
  <div class="sk-card">
    <div class="sk-bar sk-bar-mid skeleton" style="margin-bottom:14px"></div>
    <div class="sk-bar sk-bar-long skeleton"></div>
    <div class="sk-bar sk-bar-mid skeleton"></div>
    <div class="sk-bar sk-bar-short skeleton"></div>
    <div class="sk-bar sk-bar-long skeleton"></div>
  </div>
  <div class="sk-card">
    <div class="sk-bar sk-bar-short skeleton" style="margin-bottom:14px"></div>
    <div class="sk-bar sk-bar-long skeleton"></div>
    <div class="sk-bar sk-bar-mid skeleton"></div>
  </div>
</div></main>
</div>
<div class="onboarding-overlay" id="onboarding" style="display:none">
  <div class="onboarding-card" id="onboardingCard"></div>
</div>
<script>
const LEVELS=["Beginner","Basic","Pre-Intermediate","Intermediate","Upper-Intermediate","Advanced"];
const TOPICS=["trabalho","viagem","tecnologia","família","saúde","comida","esportes","educação","natureza","entretenimento","negócios","cultura","ciência","política","arte"];
const TIME_OPTIONS=[
  {total:30,l:{listening:10,reading:10,speaking:5,vocabulary:5}},
  {total:60,l:{listening:20,reading:15,speaking:15,vocabulary:10}},
  {total:90,l:{listening:30,reading:20,speaking:25,vocabulary:15}},
];

const VOCAB={
  Beginner:[
    {id:1,word:"I think that...",pt:"Eu acho que...",sentence:"I think that English is important.",chunk:true,cat:"daily"},
    {id:2,word:"I would like to...",pt:"Eu gostaria de...",sentence:"I would like to travel to London.",chunk:true,cat:"daily"},
    {id:3,word:"What do you mean?",pt:"O que você quer dizer?",sentence:"What do you mean by that?",chunk:true,cat:"daily"},
    {id:4,word:"By the way",pt:"A propósito",sentence:"By the way, did you see the news?",chunk:true,cat:"daily"},
    {id:5,word:"understand",pt:"entender",sentence:"Do you understand the question?",chunk:false,cat:"daily"},
    {id:6,word:"important",pt:"importante",sentence:"It is important to practice every day.",chunk:false,cat:"daily"},
    {id:7,word:"remember",pt:"lembrar",sentence:"I remember my first day at school.",chunk:false,cat:"daily"},
    {id:8,word:"Make sure",pt:"Certifique-se",sentence:"Make sure you practice every day.",chunk:true,cat:"daily"},
    {id:9,word:"How are you?",pt:"Como você está?",sentence:"How are you? I'm fine, thank you!",chunk:true,cat:"daily"},
    {id:10,word:"Nice to meet you",pt:"Prazer em te conhecer",sentence:"Nice to meet you, my name is Carlos.",chunk:true,cat:"daily"},
    {id:11,word:"Can you help me?",pt:"Você pode me ajudar?",sentence:"Can you help me with this exercise?",chunk:true,cat:"daily"},
    {id:12,word:"I don't know",pt:"Eu não sei",sentence:"I don't know the answer to that question.",chunk:true,cat:"daily"},
    {id:13,word:"please",pt:"por favor",sentence:"Can you repeat that, please?",chunk:false,cat:"daily"},
    {id:14,word:"sorry",pt:"desculpe",sentence:"Sorry, I didn't hear you.",chunk:false,cat:"daily"},
    {id:15,word:"again",pt:"de novo / novamente",sentence:"Can you say that again, please?",chunk:false,cat:"daily"},
  ],
  Basic:[
    {id:16,word:"As far as I know",pt:"Até onde sei",sentence:"As far as I know, the meeting is at 3pm.",chunk:true,cat:"work"},
    {id:17,word:"Let me think about it",pt:"Deixa eu pensar",sentence:"Let me think about it and get back to you.",chunk:true,cat:"work"},
    {id:18,word:"opportunity",pt:"oportunidade",sentence:"This is a great opportunity to learn.",chunk:false,cat:"work"},
    {id:19,word:"experience",pt:"experiência",sentence:"I have experience in marketing.",chunk:false,cat:"work"},
    {id:20,word:"challenge",pt:"desafio",sentence:"Learning a language is a big challenge.",chunk:false,cat:"daily"},
    {id:21,word:"definitely",pt:"definitivamente",sentence:"I definitely want to improve my English.",chunk:false,cat:"daily"},
    {id:22,word:"What about you?",pt:"E você?",sentence:"I love coffee. What about you?",chunk:true,cat:"daily"},
    {id:23,word:"actually",pt:"na verdade",sentence:"Actually, I prefer tea to coffee.",chunk:false,cat:"daily"},
    {id:24,word:"probably",pt:"provavelmente",sentence:"I will probably arrive late today.",chunk:false,cat:"daily"},
    {id:25,word:"I need to...",pt:"Eu preciso...",sentence:"I need to finish this report by Friday.",chunk:true,cat:"work"},
    {id:26,word:"Would you mind?",pt:"Você se importaria?",sentence:"Would you mind closing the window?",chunk:true,cat:"daily"},
    {id:27,word:"That sounds good",pt:"Isso soa bem / Boa ideia",sentence:"That sounds good! Let's do it.",chunk:true,cat:"daily"},
    {id:28,word:"benefit",pt:"benefício",sentence:"Exercise has many health benefits.",chunk:false,cat:"daily"},
    {id:29,word:"suggest",pt:"sugerir",sentence:"I suggest we take a short break.",chunk:false,cat:"work"},
    {id:30,word:"improve",pt:"melhorar",sentence:"I want to improve my English skills.",chunk:false,cat:"daily"},
  ],
  "Pre-Intermediate":[
    {id:31,word:"It depends on...",pt:"Depende de...",sentence:"It depends on the situation.",chunk:true,cat:"daily"},
    {id:32,word:"To be honest",pt:"Para ser honesto",sentence:"To be honest, I prefer working from home.",chunk:true,cat:"work"},
    {id:33,word:"manage",pt:"conseguir/gerenciar",sentence:"I can't manage to finish on time.",chunk:false,cat:"work"},
    {id:34,word:"available",pt:"disponível",sentence:"Is the room available on Friday?",chunk:false,cat:"travel"},

      for(const[k,type] of Object.entries(critical)){
        if(parsed[k]!==undefined && typeof parsed[k]===type) safe[k]=parsed[k];
      }
      // objetos e arrays: valida minimamente antes de aceitar
      if(parsed.mission && typeof parsed.mission==="object" && !Array.isArray(parsed.mission)) safe.mission=parsed.mission;
      if(parsed.scores && typeof parsed.scores==="object" && !Array.isArray(parsed.scores)) safe.scores=parsed.scores;
      if(parsed.vocabSRS && typeof parsed.vocabSRS==="object" && !Array.isArray(parsed.vocabSRS)) safe.vocabSRS=parsed.vocabSRS;
      if(Array.isArray(parsed.userVocab)) safe.userVocab=parsed.userVocab;
      if(Array.isArray(parsed.savedSpeaking)) safe.savedSpeaking=parsed.savedSpeaking;
      if(parsed.studyLog && typeof parsed.studyLog==="object") safe.studyLog=parsed.studyLog;
      if(parsed.missionTimes && typeof parsed.missionTimes==="object") safe.missionTimes=parsed.missionTimes;
      if(Array.isArray(parsed.aiHistory)) safe.aiHistory=parsed.aiHistory;
      if(Array.isArray(parsed.vocabGenWords)) safe.vocabGenWords=parsed.vocabGenWords;
      if(parsed.lisChecksMap && typeof parsed.lisChecksMap==="object") safe.lisChecksMap=parsed.lisChecksMap;
      // demais campos simples: mescla direto
      Object.assign(S, parsed, safe);
    }
  }
  checkDayReset();
  if(!S.userVocab) S.userVocab=[];
  if(!S.savedSpeaking) S.savedSpeaking=[];
  if(!S.studyLog) S.studyLog={};
  if(!S.sessionAccum) S.sessionAccum={listening:0,reading:0,speaking:0,vocabulary:0};
  buildReviewQueue();
}

function saveState(){
  try{
    localStorage.setItem("fluentai_v4",JSON.stringify(S));
  }catch(e){
    if(e instanceof DOMException && (e.name==="QuotaExceededError"||e.name==="NS_ERROR_DOM_QUOTA_REACHED")){
      // tenta liberar espaço limpando cache de conteúdo gerado pela IA (não é progresso do usuário)
      const keys=["genListening","genListeningText","genListeningQs","genReading","genReadingQs",
                  "lessonData","speakGenPrompts","vocabCustomResult","lisFeedback","readFeedback",
                  "genReadingFeedback","speakFeedback","clickedWordTrans"];
      keys.forEach(k=>{ if(S[k]!==undefined) S[k]=Array.isArray(S[k])?[]:null; });
      try{
        localStorage.setItem("fluentai_v4",JSON.stringify(S));
        showToast("⚠️ Armazenamento quase cheio — cache da IA foi limpo. Seu progresso está salvo.","#fcd34d");
      }catch(e2){
        showToast("❌ Armazenamento cheio! Seu progresso não foi salvo. Libere espaço no navegador.","#f87171",6000);
        console.error("FluentAI: falha crítica ao salvar estado.",e2);
      }
    }
  }
}

// Centralised day-boundary check — called on load, on render, and every 60s
// Handles: streak break, mission reset, session reset when date changes
let _lastCheckedDate = "";
function checkDayReset(){
  const today = new Date().toDateString();
  if(_lastCheckedDate === today) return; // already checked this calendar day
  _lastCheckedDate = today;

  // ── streak: break if last study was 2+ days ago ──
  if(S.lastStudyDate && S.lastStudyDate !== today){
    const diff = Math.floor((new Date() - new Date(S.lastStudyDate)) / 864e5);
    if(diff > 1 && S.streak > 0){
      S.streak = 0;
      saveState();
      // only show toast if page is already fully loaded (not on initial boot)
      if(document.getElementById("content")?.classList.contains("ready")){
        showToast("💔 Seu streak foi zerado — você não estudou ontem. Recomece hoje!","#f87171",5000);
      }
    }
  }

  // ── mission + session: reset when date flips ──
  if(S.missionDate !== today){
    S.mission = {listening:false,reading:false,speaking:false,vocabulary:false};
    S.missionDate = today;
    S.speakRound = 0; S.speakHistory = []; S.speakFeedback = null; S.speakInput = "";
    S.sessionTime = {listening:0,reading:0,speaking:0,vocabulary:0};
    S.sessionAccum = {listening:0,reading:0,speaking:0,vocabulary:0};
    saveState();
    // notify user only if app was already open (not fresh load)
    if(document.getElementById("content")?.classList.contains("ready")){
      showToast("🌅 Novo dia! Missão de hoje reiniciada. Bora estudar?","#a78bfa",4000);
      render();
    }
  }
}

function buildReviewQueue(){
  const now=Date.now();
  if(S.reviewExpressMode){
    const allV=[...Object.values(VOCAB).flat(),...S.vocabGenWords,...S.userVocab];
    S.reviewQueue=allV.filter(v=>v).map(v=>v.id);
    return;
  }
  S.reviewQueue=Object.entries(S.vocabSRS).filter(([,d])=>d.nextReview&&d.nextReview<=now).map(([id])=>parseInt(id));
}

function logStudy(tab){
  const today=new Date().toDateString();
  if(!S.studyLog[today]) S.studyLog[today]={};
  S.studyLog[today][tab]=(S.studyLog[today][tab]||0)+1;
}

function addXP(n){
  S.xp+=n;
  const today=new Date().toDateString();
  if(S.lastStudyDate!==today){
    // first activity of the day: increment streak (only if studied yesterday or first ever)
    const last=S.lastStudyDate?new Date(S.lastStudyDate):null;
    const diff=last?Math.floor((new Date()-last)/864e5):99;
    S.streak=diff<=1?S.streak+1:1; // +1 if consecutive, restart to 1 if gap
    S.lastStudyDate=today;
    S.totalDays++;
    _lastCheckedDate=today; // sync so checkDayReset() doesn't run again this day
  }
  document.getElementById("xpVal").textContent=S.xp;
  document.getElementById("streakVal").textContent=S.streak;
  saveState();
}

function completeTask(task){
  if(S.mission[task]) return;
  S.mission[task]=true; addXP(25);
  S.scores[task]=Math.min(100,S.scores[task]+3);
  logStudy(task);
  saveState();
  const mc=Object.values(S.mission).filter(Boolean).length;
  if(mc===4){ addXP(75); S.tab="dashboard"; }
  render();
}

const synth=window.speechSynthesis||null;
let recognition=null,isRecording=false;
function speak(text,rate){
  if(!synth||!text) return; synth.cancel();
  const u=new SpeechSynthesisUtterance(String(text).substring(0,400));
  u.lang="en-US"; u.rate=rate||1;
  const vs=synth.getVoices();
  const v=vs.find(v=>v.lang==="en-US"&&v.name.includes("Google"))||vs.find(v=>v.lang==="en-US")||vs[0];
  if(v) u.voice=v; synth.speak(u);
}

function speakWithCallback(text,rate,onEnd){
  if(!synth||!text) return; synth.cancel();
  const u=new SpeechSynthesisUtterance(String(text).substring(0,400));
  u.lang="en-US"; u.rate=rate||1;
  const vs=synth.getVoices();
  const v=vs.find(v=>v.lang==="en-US"&&v.name.includes("Google"))||vs.find(v=>v.lang==="en-US")||vs[0];
  if(v) u.voice=v;
  if(onEnd) u.onend=onEnd;
  synth.speak(u);
}

function startShadow(text,rate){
  if(!synth||!text) return;
  S.shadowActive=false; render(); // reset any previous shadow state
  speakWithCallback(text, rate, ()=>{
    // audio finished — show 3-second countdown then cue
    S.shadowActive=true; S.shadowCountdown=3; render();
    const iv=setInterval(()=>{
      S.shadowCountdown--;
      if(S.shadowCountdown<=0){
        clearInterval(iv);
        S.shadowActive=false; S.shadowCountdown=0; render();
      } else { render(); }
    },1000);
  });
}
function initRec(onResult,onEnd){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR) return null;
  const r=new SR(); r.lang="en-US"; r.continuous=true; r.interimResults=false;
  r.onresult=e=>{const t=Array.from(e.results).map(r=>r[0].transcript).join(" "); onResult(t);};
  r.onend=()=>{ if(isRecording){try{r.start();}catch(e){}} else onEnd(); };
  r.onerror=()=>{ isRecording=false; onEnd(); };
  return r;
}
function toggleRec(inputId,statusId,btnId){
  if(isRecording){
    isRecording=false; if(recognition) recognition.stop();
    const b=document.getElementById(btnId); if(b){b.className="voice-btn voice-idle";b.textContent="🎤";}
    const s=document.getElementById(statusId); if(s) s.textContent="Gravação encerrada.";
    return;
  }
  recognition=initRec(txt=>{
    const inp=document.getElementById(inputId);
    if(inp){inp.value+=(inp.value?" ":"")+txt;}
  },()=>{});
  if(!recognition) return;
  isRecording=true; recognition.start();
  const b=document.getElementById(btnId); if(b){b.className="voice-btn voice-recording";b.textContent="⏹";}
  const s=document.getElementById(statusId); if(s) s.textContent="🔴 Gravando... fale em inglês";
}

let timerInterval=null;
function startTimer(tab){
  stopTimer();
  S.currentTimerTab=tab;
  S.sessionStart=Date.now();
  timerInterval=setInterval(()=>{
    if(!S.sessionStart) return;
    const elapsed=S.sessionAccum[tab]+Math.floor((Date.now()-S.sessionStart)/1000);
    S.sessionTime[tab]=elapsed;
    const el=document.getElementById("sessionTimerFill");
    const lbl=document.getElementById("sessionTimerLabel");
    const target=(S.missionTimes[tab]||15)*60;
    const pct=Math.min(100,Math.round((elapsed/target)*100));
    if(el) el.style.width=pct+"%";
    if(lbl) lbl.textContent=formatTime(elapsed)+" / "+S.missionTimes[tab]+"min";
  },1000);
}
function stopTimer(){
  if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
  if(S.sessionStart&&S.currentTimerTab){
    const elapsed=Math.floor((Date.now()-S.sessionStart)/1000);
    S.sessionAccum[S.currentTimerTab]=(S.sessionAccum[S.currentTimerTab]||0)+elapsed;
    S.sessionTime[S.currentTimerTab]=S.sessionAccum[S.currentTimerTab];
  }
  S.sessionStart=null;
}
function formatTime(s){ return Math.floor(s/60)+":"+(s%60).toString().padStart(2,"0"); }

async function callAI(messages,level){
  const TIMEOUT_MS=15000;
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),TIMEOUT_MS);
  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages,level:level||S.level}),
      signal:ctrl.signal,
    });
    clearTimeout(timer);
    const d=await res.json();
    if(res.status===429) throw Object.assign(new Error(d.error||"rate_limit"),{code:"RATE_LIMIT"});
    if(!res.ok||d.error) throw Object.assign(new Error(d.error||"api_error"),{code:"API_ERROR"});
    return d.reply;
  }catch(e){
    clearTimeout(timer);
    if(e.name==="AbortError")
      throw Object.assign(new Error("\u23f1 A IA demorou demais para responder. Tente novamente."),{code:"TIMEOUT"});
    if(e.code==="RATE_LIMIT"||e.message.includes("429"))
      throw Object.assign(new Error("\u23f3 Muitas requisições. Aguarde alguns segundos e tente novamente."),{code:"RATE_LIMIT"});
    if(e.code==="API_ERROR")
      throw e;
    if(e.name==="TypeError"||e.message.includes("Failed to fetch")||e.message.includes("NetworkError"))
      throw Object.assign(new Error("\U0001f4f6 Sem conexão. Verifique sua internet e tente novamente."),{code:"NETWORK"});
    console.error("FluentAI API error:",e);
    throw Object.assign(new Error("\u274c Erro inesperado. Tente novamente."),{code:"UNKNOWN"});
  }
}

}

async function startLesson(topic){
  S.lessonTopic=topic; S.lessonStep=0; S.lessonData=null; S.lessonLoading=true; render();
  try{
    const p=`You are an EFL content creator. Create a structured English lesson about "${topic}" for ${S.level} level.\n\nCRITICAL RULES:\n- "text": ALWAYS in English, regardless of level. Adapt complexity but NEVER use Portuguese in the text.\n- "vocab": each "word" and "sentence" MUST be in English. "pt" is the Portuguese translation of the word only.\n- "sentence": one natural English example sentence using the word in context.\n- "speakPrompt": a question in English for the student to answer.\n\nVOCABULARY RULE: ${LV_VOCAB[S.level]}\n\nReturn ONLY valid JSON, no markdown, no explanation:\n{"text":"[80-100 word spoken-English passage about ${topic}]","vocab":[{"word":"[English word]","pt":"[Portuguese translation]","sentence":"[English example sentence]"},{"word":"...","pt":"...","sentence":"..."},{"word":"...","pt":"...","sentence":"..."}],"speakPrompt":"[English question about ${topic}]"}`;
    const r=await callAI([{role:"user",content:p}]);
    S.lessonData=JSON.parse(r.replace(/```json|```/g,"").trim());
  }catch(e){
    S.lessonData={text:e.message||"Erro ao gerar lição.",vocab:[],speakPrompt:"Describe what you know about "+topic};
    showToast(e.message||"Erro ao gerar lição. Tente novamente.","#f87171");
  }
  S.lessonLoading=false; render();
}

async function submitLessonSpeaking(){
  const ta=document.getElementById("lessonSpeakArea");
  const text=ta?ta.value.trim():"";
  if(!text||text.length<5) return;
  S.lessonLoading=true; render();
  try{
    const p=`You are an EFL teacher. Student level: ${S.level}. Topic: "${S.lessonTopic}".\nStudent wrote: "${text}"\n\nProvide feedback in this EXACT format:\n✅ Corrected: [corrected English sentence]\n💡 More natural: [more native-sounding English version]\n📝 Rule: [one grammar rule in ${LANG(S.level)}, max 1 sentence]\n🗣️ Your turn: [one follow-up question in English]\n\nIMPORTANT: Keep the corrected sentences in English. Use ${LANG(S.level)} only for the Rule explanation.`;
    S.lessonData.speakFeedback=await callAI([{role:"user",content:p}]);
  }catch(e){
    S.lessonData.speakFeedback=null;
    showToast(e.message||"Erro ao processar. Tente novamente.","#f87171");
  }
  S.lessonLoading=false; render();
}

let lessonRec=null;
function toggleLessonMic(){
  const btn=document.getElementById("lessonMicBtn");
  const status=document.getElementById("lessonMicStatus");
  const ta=document.getElementById("lessonSpeakArea");
  if(lessonRec){
    lessonRec.stop(); lessonRec=null;
    if(btn) btn.textContent="🎤 Falar";
    if(status) status.textContent="";
    return;
  }
  lessonRec=initRec(
    txt=>{ if(ta){ ta.value=(ta.value?ta.value+" ":"")+txt; S.lessonSpeakInput=ta.value; } },
    ()=>{ lessonRec=null; if(btn) btn.textContent="🎤 Falar"; if(status) status.textContent=""; }
  );
  if(!lessonRec){ showToast("Microfone não disponível neste navegador.","#f87171"); return; }
  lessonRec.start();
  if(btn) btn.textContent="⏹ Parar";
  if(status) status.textContent="🔴 Ouvindo... fale em inglês";
}

/* ═══ Speaking Feedback — MELHORADO (Pareto) ═══
   2 blocos sempre visíveis + detalhes colapsáveis
*/
function parseSpeakFeedback(raw){
  if(!raw) return null;
  const sections={corrected:"",natural:"",pronunciation:"",learned:"",followup:""};
  const patterns=[
    {key:"corrected",   re:/✅\s*CORRECTED[:\s]*([\s\S]*?)(?=💡|🔊|📝|🗣️|$)/i},
    {key:"natural",     re:/💡\s*MORE NATURAL[:\s]*([\s\S]*?)(?=🔊|📝|🗣️|$)/i},
    {key:"pronunciation",re:/🔊\s*PRONUNCIATION TIP[:\s]*([\s\S]*?)(?=📝|🗣️|$)/i},
    {key:"learned",     re:/📝\s*WHAT(?:\s+YOU)?\s*(?:LEARNED|NOTICED)[:\s]*([\s\S]*?)(?=🗣️|$)/i},
    {key:"followup",    re:/🗣️\s*NOW YOU[:\s]*([\s\S]*?)$/i},
  ];
  for(const p of patterns){
    const m=raw.match(p.re);
    if(m) sections[p.key]=m[1].trim();
  }
  const hasAny=Object.values(sections).some(v=>v.length>0);
  return hasAny?sections:null;
}

function renderSpeakFeedback(raw){
  const p=parseSpeakFeedback(raw);

  // Fallback: se parsing falhar, mostra raw formatado
  if(!p){
    return `<div style="font-size:13px;line-height:1.7;white-space:pre-wrap;color:#d1fae5;background:#07070f;border-radius:10px;padding:14px">${esc(raw)}</div>`;

      </div>

  </div>`:"";

  // Detalhes colapsáveis (pronúncia + o que aprender)
  const hasDetails=p.pronunciation||p.learned;
  const details=hasDetails?`
  <div class="fb-card" style="background:#0c0c18;border:1px solid #1a1828">
    <button class="fb-toggle" onclick="
      const d=document.getElementById('${uid}');

    <div class="fb-details" id="${uid}">
      ${p.pronunciation?`<div class="fb-detail-row">

        <div class="fb-detail-text">${esc(p.learned)}</div>
      </div>`:""}
    </div>
  </div>`:"";

  // Follow-up (sempre visível — convida à próxima produção)

  return block1+block2+details+followup;
}

function makeClickableText(text){
  if(!text) return "";
  return text.replace(/([a-zA-Z''-]+)/g, w=>`<span onclick="clickWord('${w.replace(/'/g,"\\'")}',event)" style="cursor:pointer;border-radius:3px;transition:background .15s" onmouseover="this.style.background='#1e1a2e'" onmouseout="this.style.background=''">${esc(w)}</span>`);
}

async function clickWord(word,event){
  if(event) event.stopPropagation();
  const clean=word.replace(/[^a-zA-Z'-]/g,"").toLowerCase();
  if(clean.length<2) return;
  if(S.clickedWord===clean&&S.clickedWordTrans){ S.clickedWord=null; S.clickedWordTrans=null; render(); return; }
  S.clickedWord=clean; S.clickedWordTrans="traduzindo..."; render();
  try{
    const r=await callAI([{role:"user",content:`Translate the English word "${clean}" to Brazilian Portuguese. Give ONLY the translation (1-4 words max). No explanation, no punctuation.`}]);
    S.clickedWordTrans=r.trim();
  }catch(e){ S.clickedWordTrans=null; }
  render();
}

function renderReadingFeedback(raw){
  if(!raw) return "";
  const lines=raw.split("\n");
  let html="",inBlock=false,blockLines=[];
  const flushBlock=()=>{
    if(!blockLines.length) return;
    const joined=blockLines.join("\n").trim();
    if(!joined) return;
    const isOk=joined.includes("✅");
    const color=isOk?"#059669":"#dc2626";
    html+=`<div style="padding:10px 13px;border-radius:9px;background:#0a0a15;border-left:3px solid ${color};margin-bottom:9px;font-size:13px;line-height:1.7;color:#e2e0f0;white-space:pre-wrap">${esc(joined)}</div>`;
    blockLines=[];
  };
  for(const line of lines){
    if(/^\[Q\d\]|^Q\d[\.\):\s]/i.test(line.trim())||/^(Question|Pergunta)\s*\d/i.test(line.trim())){
      flushBlock(); inBlock=true; blockLines=[line];
    } else if(inBlock){ blockLines.push(line); }
    else{ if(line.trim()) html+=`<div style="font-size:13px;color:#a78bfa;line-height:1.7;margin-bottom:4px">${esc(line)}</div>`; }
  }
  flushBlock();
  if(!html) html=`<div style="font-size:13px;line-height:1.7;white-space:pre-wrap;color:#d1fae5">${esc(raw)}</div>`;
  return html;
}

function srsCompute(id,quality){
  const now=Date.now(), day=864e5;
  const prev=S.vocabSRS[id]||{ease:2.5,interval:1,reps:0};
  let {ease,interval,reps}=prev;
  if(quality<3){ reps=0; interval=1; }
  else{
    if(reps===0) interval=1;
    else if(reps===1) interval=6;
    else interval=Math.round(interval*ease);
    reps++;
    ease=ease+(0.1-(5-quality)*(0.08+(5-quality)*0.02));
    if(ease<1.3) ease=1.3;
    if(ease>2.5) ease=2.5;
  }
  const status=quality>=4?"learned":"review";
  const nextReview=now+(interval*day);
  return {ease,interval,reps,status,nextReview,lastReview:now,quality};
}

function srsAnswer(id,difficulty){
  const qualityMap={hard:1,medium:3,easy:5};
  const quality=qualityMap[difficulty]||3;
  const result=srsCompute(id,quality);
  S.vocabSRS[id]=result;

  // feedback visual: próxima data de revisão
  const nextDate=new Date(result.nextReview).toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit"});
  const dayLabel=result.interval===1?"amanhã":result.interval===6?"em 6 dias":"em "+result.interval+" dias";
  const colorMap={hard:"#f87171",medium:"#fcd34d",easy:"#6ee7b7"};
  const iconMap={hard:"😰",medium:"🤔",easy:"😊"};
  const statusLabel=result.status==="learned"?"✨ Dominada!":"⟳ Para revisar";
  showToast(
    iconMap[difficulty]+" "+statusLabel+" · Próxima revisão: "+dayLabel+" ("+nextDate+")",
    colorMap[difficulty],
    3000
  );

  completeTask("vocabulary"); nextVocabCard();
}

function setAIInput(txt){ S.aiInput=txt; S.tab="ai"; render(); const ta=document.getElementById("aiTextarea"); if(ta){ta.value=txt;ta.focus();} }

async function sendAIMessage(){
  const ta=document.getElementById("aiTextarea");
  const msg=(ta?ta.value:S.aiInput).trim();
  if(!msg||S.aiLoading) return;
  S.aiInput=""; S.aiLoading=true;
  S.aiHistory.push({role:"user",content:msg});
  render();
  setTimeout(()=>{const ca=document.getElementById("chatArea");if(ca)ca.scrollTop=ca.scrollHeight;},50);
  try{
    const reply=await callAI([
      {role:"system",content:P_AI_COACH_SYSTEM(S.level)},
      ...S.aiHistory.slice(-14)
    ]);
    S.aiHistory.push({role:"assistant",content:reply});
  }catch(e){
    const aiErr=e.message||"❌ Erro de conexão. Tente novamente.";
    S.aiHistory.push({role:"assistant",content:aiErr});
  }
  S.aiLoading=false; saveState(); render();
  setTimeout(()=>{const ca=document.getElementById("chatArea");if(ca)ca.scrollTop=ca.scrollHeight;},50);
}

        {icon:"◈",c:"#f59e0b",t:"Speaking",d:"Feedback da IA na sua produção oral"},
        {icon:"≡",c:"#10b981",t:"Reading",d:"Leitura adaptada ao seu nível"},
        {icon:"⊟",c:"#3b82f6",t:"Vocabulary",d:"Repetição espaçada com algoritmo SRS"},
      ].map(m=>`<div style="background:#0c0c18;border:1px solid #1a1828;border-radius:10px;padding:12px">
        <div style="font-size:18px;color:${m.c};margin-bottom:6px">${m.icon} <span style="font-size:13px;font-weight:600;color:#e2e0f0">${m.t}</span></div>
        <div style="font-size:11px;color:#6b7280;line-height:1.5">${m.d}</div>
      </div>`).join("")}
    </div>
    <div style="background:#0f0a1e;border:1px solid #3d1d6b;border-radius:10px;padding:12px;text-align:center;margin-bottom:20px">
      <div style="font-size:12px;color:#a78bfa;font-weight:600">💡 Leva só 15–20 minutos por dia</div>
      <div style="font-size:11px;color:#6b7280;margin-top:3px">Missão diária gamificada com streak, XP e progressão de nível</div>
    </div>`;
  } else {
    inner+=`<div style="font-size:18px;font-weight:700;font-family:'Space Grotesk',sans-serif;margin-bottom:18px;line-height:1.4">${q.q}</div>`;
    if(q.type==="name"){
      inner+=`<input class="inp" id="obName" placeholder="${q.placeholder}" value="${esc(S.onboardAnswers.name||"")}" style="margin-bottom:16px" onkeydown="if(event.key==='Enter')obNext()"/>`;
    } else if(q.type==="level"){
      inner+=`<div style="display:flex;flex-direction:column;gap:7px;margin-bottom:16px">${q.options.map(o=>`<button class="goal-btn${S.onboardAnswers.level===o?" sel":""}" onclick="S.onboardAnswers.level='${o}';renderOnboarding()">${o}</button>`).join("")}</div>`;
    } else if(q.type==="goal"){
      inner+=`<div style="display:flex;flex-direction:column;gap:7px;margin-bottom:12px">${q.options.map(o=>`<button class="goal-btn${S.onboardAnswers.goalMonths===o.v&&!S.onboardAnswers.goalCustom?" sel":""}" onclick="S.onboardAnswers.goalMonths=${o.v};S.onboardAnswers.goalCustom='';const i=document.getElementById('obGoalCustom');if(i)i.value='';renderOnboarding()">${o.l}</button>`).join("")}</div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px">
        <input class="inp-number" id="obGoalCustom" type="number" min="1" max="120" placeholder="Outro prazo..." value="${S.onboardAnswers.goalCustom||""}" oninput="S.onboardAnswers.goalCustom=this.value;if(this.value){S.onboardAnswers.goalMonths=parseInt(this.value)||12;}renderOnboarding()"/>
        <span style="font-size:12px;color:#6b7280">meses</span>
      </div>`;
    } else if(q.type==="time"){
      inner+=`<div style="display:flex;flex-direction:column;gap:7px;margin-bottom:12px">${TIME_OPTIONS.map((o,i)=>`<button class="goal-btn${S.onboardAnswers.timeIdx===i&&!S.onboardAnswers.timeCustom?" sel":""}" onclick="S.onboardAnswers.timeIdx=${i};S.onboardAnswers.time=${o.total};S.onboardAnswers.timeCustom='';const inp=document.getElementById('obTimeCustom');if(inp)inp.value='';renderOnboarding()">${o.total} minutos por dia</button>`).join("")}</div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px">
        <input class="inp-number" id="obTimeCustom" type="number" min="10" max="300" placeholder="Outro tempo..." value="${S.onboardAnswers.timeCustom||""}" oninput="S.onboardAnswers.timeCustom=this.value;if(this.value){S.onboardAnswers.time=parseInt(this.value)||60;S.onboardAnswers.timeIdx=-1;}renderOnboarding()"/>
        <span style="font-size:12px;color:#6b7280">minutos por dia</span>
      </div>`;
    }
  }

  const canNext=q.type==="intro"||q.type==="name"||(q.type==="level"&&S.onboardAnswers.level)||(q.type==="goal"&&(S.onboardAnswers.goalMonths!==undefined||S.onboardAnswers.goalCustom))||(q.type==="time"&&(S.onboardAnswers.time||S.onboardAnswers.timeCustom));
  const btnLabel=q.type==="intro"?"Personalizar meu plano →":isLast?"Começar a aprender! 🚀":"Continuar →";
  inner+=`<button class="btn btn-primary" style="width:100%;justify-content:center" onclick="obNext()" ${!canNext?"disabled":""}>${btnLabel}</button>`;
  card.innerHTML=inner;
  // auto-focus name input for faster typing
  if(q.type==="name"){ const inp=document.getElementById("obName"); if(inp) setTimeout(()=>inp.focus(),50); }
}

function obNext(){
  const q=OB_QUESTIONS[S.onboardStep];
  if(q.type==="name"){const inp=document.getElementById("obName");S.onboardAnswers.name=inp?inp.value.trim():"";}
  S.onboardStep++;
  if(S.onboardStep>=OB_QUESTIONS.length){
    if(S.onboardAnswers.name) S.userName=S.onboardAnswers.name;
    if(S.onboardAnswers.level) S.level=S.onboardAnswers.level;
    if(S.onboardAnswers.goalCustom) { S.goalMonths=parseInt(S.onboardAnswers.goalCustom)||12; S.goalCustom=S.onboardAnswers.goalCustom; }
    else if(S.onboardAnswers.goalMonths!==undefined) S.goalMonths=S.onboardAnswers.goalMonths;
    if(S.onboardAnswers.timeCustom){
      const total=parseInt(S.onboardAnswers.timeCustom)||60;
      S.missionTimes={listening:Math.round(total*.33),reading:Math.round(total*.25),speaking:Math.round(total*.25),vocabulary:Math.round(total*.17)};
      S.missionTimeCustom=S.onboardAnswers.timeCustom;
    } else if(S.onboardAnswers.timeIdx>=0&&S.onboardAnswers.timeIdx!==undefined){
      S.missionTimes=TIME_OPTIONS[S.onboardAnswers.timeIdx].l;
    }
    S.totalDays=1; S.lastStudyDate=new Date().toDateString(); S.streak=1;
    saveState(); document.getElementById("onboarding").style.display="none"; render();
  } else renderOnboarding();
}

if(synth) synth.onvoiceschanged=()=>synth.getVoices();
loadState();
const isFirst=!S.userName&&S.totalDays===0;
render();
// poll every 60s — catches midnight rollover when app stays open overnight
setInterval(checkDayReset, 60_000);
// reveal content with fade after first render — hides FOUC and skeleton flash
requestAnimationFrame(()=>{ const el=document.getElementById("content"); if(el) el.classList.add("ready"); });
if(isFirst) showOnboarding();
if(["listening","speaking","reading","vocabulary"].includes(S.tab)) startTimer(S.tab);
</script>
</body>
</html>
