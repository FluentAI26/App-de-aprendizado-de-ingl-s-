<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="FluentAI — Aprenda inglês do zero ao intermediário em 12 meses com IA adaptativa"/>
<title>FluentAI — English Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:#08080f;color:#e2e0f0;min-height:100vh;line-height:1.5}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#2d2a40;border-radius:2px}

/* ── Layout ── */
#app{display:flex;flex-direction:column;min-height:100vh}
.header{background:#060610;border-bottom:1px solid #1a1828;padding:0 20px;position:sticky;top:0;z-index:100;flex-shrink:0}
.header-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px;gap:10px}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-icon{width:30px;height:30px;background:#5b21b6;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#e9d5ff;flex-shrink:0}
.logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:#e2e0f0;letter-spacing:-0.02em}
.logo-text span{color:#a78bfa}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.level-select{background:#111118;border:1px solid #2d2a40;color:#a78bfa;padding:4px 10px;border-radius:8px;font-size:12px;font-family:inherit;outline:none;cursor:pointer}
.streak-pill{display:flex;align-items:center;gap:5px;background:#1e1a2e;border-radius:8px;padding:4px 11px;font-size:13px;font-weight:700;color:#fcd34d}
.xp-pill{font-size:12px;color:#888;background:#111118;padding:4px 11px;border-radius:8px;border:1px solid #1e1e2a}

/* ── Tabs ── */
.tabs{background:#060610;border-bottom:1px solid #1a1828;padding:0 20px;overflow-x:auto;flex-shrink:0}
.tabs-inner{max-width:860px;margin:0 auto;display:flex;gap:2px;padding:5px 0}
.tab{background:none;border:none;cursor:pointer;padding:8px 14px;border-radius:9px;color:#666;font-size:13px;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap;font-weight:400}
.tab:hover{color:#bbb;background:#14121e}
.tab.active{color:#a78bfa;background:#1a1630;font-weight:500}
.tab-icon{font-size:14px}

/* ── Main content ── */
.main{flex:1;padding:24px 20px 40px}
.content{max-width:860px;margin:0 auto}

/* ── Cards ── */
.card{background:#0f0f1a;border:1px solid #1a1828;border-radius:14px;padding:20px}
.card+.card{margin-top:14px}
.card-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px}
.card-sub{font-size:12px;color:#6b7280;margin-bottom:16px}

/* ── Page headers ── */
.page-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px}
.page-sub{font-size:13px;color:#6b7280;margin-bottom:22px}

/* ── Buttons ── */
.btn{border:none;border-radius:10px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:7px;font-size:14px;padding:9px 18px}
.btn:active{transform:scale(.97)}
.btn-primary{background:#5b21b6;color:#e9d5ff}.btn-primary:hover{background:#6d28d9}
.btn-secondary{background:#141222;color:#a78bfa;border:1px solid #2d2a40;font-size:13px;padding:7px 14px}.btn-secondary:hover{background:#1e1a2e}
.btn-success{background:#064e3b;color:#6ee7b7}.btn-success:hover{background:#065f46}
.btn-danger{background:#1f0e0e;color:#f87171;border:1px solid #450a0a;font-size:13px;padding:7px 14px}
.btn-danger:hover{background:#2d1515}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-sm{font-size:12px;padding:5px 12px}
.btn-block{width:100%;justify-content:center}

/* ── Progress ── */
.progress-wrap{background:#141222;border-radius:99px;overflow:hidden;height:6px}
.progress-bar{height:100%;border-radius:99px;background:#7c3aed;transition:width .5s ease}

/* ── Stat cards ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat-card{background:#0c0c18;border:1px solid #1a1828;border-radius:12px;padding:14px;text-align:center}
.stat-val{font-size:20px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:#a78bfa}
.stat-label{font-size:11px;font-weight:500;margin-top:3px;color:#ccc}
.stat-sub{font-size:10px;color:#555;margin-top:1px}

/* ── Mission items ── */
.mission-list{display:flex;flex-direction:column;gap:8px}
.mission-item{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:12px;background:#0c0c18;border:1px solid #1a1828;transition:border-color .2s}
.mission-item.done{border-color:#065f46;background:#031710}
.check-circle{width:22px;height:22px;border-radius:50%;border:2px solid #2d2a40;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;cursor:pointer;transition:all .2s;color:transparent}
.check-circle.done{background:#059669;border-color:#059669;color:#fff}
.mission-info{flex:1}
.mission-name{font-size:13px;font-weight:500}
.mission-time{font-size:11px;color:#6b7280;margin-top:1px}

/* ── Badges ── */
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.badge-purple{background:#1e1a2e;color:#a78bfa}
.badge-green{background:#064e3b;color:#6ee7b7}
.badge-amber{background:#451a03;color:#fcd34d}
.badge-blue{background:#0c2740;color:#60a5fa}

/* ── Perf bars ── */
.perf-bar{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.perf-label{width:76px;font-size:12px;color:#888}
.perf-pct{width:28px;font-size:12px;color:#666;text-align:right}

/* ── Flashcard ── */
.flashcard{background:#0f0f1a;border:1px solid #2d2a40;border-radius:16px;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:border-color .25s;padding:26px;text-align:center;margin-bottom:14px;user-select:none}
.flashcard:hover{border-color:#5b21b6}
.fc-hint{font-size:10px;color:#555;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.fc-word{font-size:26px;font-weight:700;font-family:'Space Grotesk',sans-serif;color:#a78bfa;line-height:1.2}
.fc-pt{font-size:13px;color:#f59e0b;font-weight:600;margin-bottom:7px}
.fc-sentence{font-size:13px;color:#aaa;font-style:italic;margin-bottom:8px}

/* ── Chat ── */
.chat-area{flex:1;overflow-y:auto;background:#07070f;border-radius:13px;border:1px solid #1a1828;padding:14px;min-height:240px;max-height:380px;display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.chat-empty{text-align:center;padding:40px 16px;color:#555;margin:auto}
.chat-empty-icon{font-size:32px;margin-bottom:10px}
.bubble{max-width:84%;padding:10px 14px;border-radius:13px;font-size:13px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.bubble-user{background:#1e1a2e;color:#c4b5fd;border-bottom-right-radius:4px;align-self:flex-end}
.bubble-ai{background:#0f0f1a;border:1px solid #1a1828;color:#e2e0f0;border-bottom-left-radius:4px;align-self:flex-start}
.bubble-thinking{color:#555;font-style:italic}

/* ── Voice button ── */
.voice-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s;flex-shrink:0}
.voice-btn.idle{background:#141222;color:#888;border:1px solid #2d2a40}
.voice-btn.idle:hover{background:#1e1a2e;color:#a78bfa}
.voice-btn.recording{background:#7c3aed;color:#fff;animation:pulse 1.2s infinite}
.voice-btn.speaking{background:#059669;color:#fff}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,.5)}50%{box-shadow:0 0 0 8px rgba(124,58,237,0)}}

/* ── Input ── */
.inp{background:#0c0c18;border:1px solid #2d2a40;border-radius:10px;color:#e2e0f0;font-family:inherit;font-size:13px;padding:10px 13px;width:100%;outline:none;resize:vertical}
.inp:focus{border-color:#5b21b6}
.inp-row{display:flex;gap:9px;align-items:flex-end}

/* ── Speaking ── */
.prompt-card{background:#0f0f1a;border:1px solid #3d1d6b;border-radius:14px;padding:20px;margin-bottom:16px}
.prompt-label{background:#1e1a2e;display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;color:#a78bfa;font-weight:700;letter-spacing:.06em;margin-bottom:12px}
.prompt-text{font-size:18px;font-weight:700;font-family:'Space Grotesk',sans-serif;line-height:1.4;margin-bottom:18px;color:#e2e0f0}
.voice-status{font-size:12px;color:#6b7280;margin-top:6px;min-height:18px;text-align:center}

/* ── Listening ── */
.text-box{background:#07070f;border:1px solid #1a1828;border-radius:10px;padding:14px;line-height:1.8;font-size:13px;color:#c4b5fd;margin-bottom:12px}
.checks{display:flex;gap:18px;flex-wrap:wrap}
.check-label{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px}
.check-label input{accent-color:#7c3aed}

/* ── Reading ── */
.questions{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.question-item p{font-size:13px;color:#c4b5fd;margin-bottom:5px}

/* ── Review ── */
.review-item{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:#0c0c18;border-radius:10px;border:1px solid #3d1503;margin-bottom:7px}
.sched-item{display:flex;align-items:center;gap:10px;padding:9px 13px;background:#0c0c18;border-radius:10px;margin-bottom:7px}
.sched-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ── Vocab list ── */
.vocab-row{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;background:#0c0c18;border-radius:8px;margin-bottom:5px;transition:opacity .2s}
.vocab-row.learned{opacity:.4}

/* ── Journey levels ── */
.levels-row{display:flex;justify-content:space-between;margin-top:10px}
.level-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.level-dot{width:9px;height:9px;border-radius:50%}

/* ── Quick prompts ── */
.quick-prompts{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}

/* ── Responsive ── */
@media(max-width:600px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .tab{font-size:12px;padding:7px 10px}
  .page-title{font-size:18px}
  .prompt-text{font-size:15px}
  .stat-val{font-size:18px}
  .header-right{gap:5px}
  .streak-pill,.xp-pill{font-size:11px;padding:3px 8px}
}

/* ── Success state ── */
.success-box{background:#031710;border:1px solid #065f46;border-radius:10px;padding:13px}
.success-box .success-title{color:#6ee7b7;font-weight:700;margin-bottom:6px;font-size:13px}
.success-box p{font-size:13px;color:#d1fae5;line-height:1.65}

/* ── Chunk list ── */
.chunk-item{display:flex;align-items:center;gap:10px;padding:9px 13px;background:#0c0c18;border-radius:10px;border:1px solid #1a1828;margin-bottom:7px}
.chunk-word{color:#a78bfa;font-weight:600;font-size:13px}
.chunk-pt{color:#6b7280;font-size:11px;margin-left:6px}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="#">
        <div class="logo-icon">F</div>
        <span class="logo-text">fluent<span>ai</span></span>
      </a>
      <div class="header-right">
        <select class="level-select" id="levelSelect">
          <option>Beginner</option>
          <option>Basic</option>
          <option>Pre-Intermediate</option>
          <option>Intermediate</option>
        </select>
        <div class="streak-pill">🔥 <span id="streakVal">7</span></div>
        <div class="xp-pill">✦ <span id="xpVal">420</span> XP</div>
      </div>
    </div>
  </header>

  <nav class="tabs">
    <div class="tabs-inner" id="tabsInner"></div>
  </nav>

  <main class="main">
    <div class="content" id="content"></div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════
const VOCAB = [
  {id:1,  word:"I think that...",       pt:"Eu acho que...",         sentence:"I think that learning English is fun.",          chunk:true},
  {id:2,  word:"I would like to...",    pt:"Eu gostaria de...",      sentence:"I would like to travel to New York.",            chunk:true},
  {id:3,  word:"What do you mean?",     pt:"O que você quer dizer?", sentence:"What do you mean by that?",                      chunk:true},
  {id:4,  word:"By the way",            pt:"A propósito",            sentence:"By the way, did you see the news?",              chunk:true},
  {id:5,  word:"As far as I know",      pt:"Até onde sei",           sentence:"As far as I know, the meeting is at 3pm.",       chunk:true},
  {id:6,  word:"Let me think about it", pt:"Deixa eu pensar",        sentence:"Let me think about it and get back to you.",     chunk:true},
  {id:7,  word:"What about you?",       pt:"E você?",                sentence:"I love coffee. What about you?",                 chunk:true},
  {id:8,  word:"Make sure",             pt:"Certifique-se",          sentence:"Make sure you practice every day.",              chunk:true},
  {id:9,  word:"It depends on...",      pt:"Depende de...",          sentence:"It depends on the weather.",                     chunk:true},
  {id:10, word:"opportunity",           pt:"oportunidade",           sentence:"This is a great opportunity to learn.",          chunk:false},
  {id:11, word:"experience",            pt:"experiência",            sentence:"I have experience in marketing.",                chunk:false},
  {id:12, word:"understand",            pt:"entender",               sentence:"Do you understand the question?",                chunk:false},
  {id:13, word:"important",             pt:"importante",             sentence:"It's important to practice every day.",          chunk:false},
  {id:14, word:"remember",              pt:"lembrar",                sentence:"I remember my first day at school.",             chunk:false},
  {id:15, word:"challenge",             pt:"desafio",                sentence:"Learning a language is a big challenge.",        chunk:false},
  {id:16, word:"definitely",            pt:"definitivamente",        sentence:"I definitely want to improve my English.",       chunk:false},
  {id:17, word:"manage",                pt:"conseguir / gerenciar",  sentence:"I can't manage to finish on time.",              chunk:false},
  {id:18, word:"improve",               pt:"melhorar",               sentence:"I want to improve my speaking skills.",          chunk:false},
  {id:19, word:"available",             pt:"disponível",             sentence:"Is the room available on Friday?",               chunk:false},
  {id:20, word:"actually",              pt:"na verdade",             sentence:"Actually, I think we should leave earlier.",     chunk:false},
];

const LISTENING = {
  Beginner:[
    {id:1,title:"Daily Routine",text:"My name is Ana. I wake up at 7am. I eat breakfast and drink coffee. Then I go to work by bus. I work from 9 to 5. After work, I watch TV and read a book. I go to bed at 11pm.",accent:"American"},
    {id:2,title:"At the Supermarket",text:"I need to buy some things today. I need milk, eggs, and bread. I also need fruits — apples and bananas. The supermarket is near my house. It is open every day from 8am to 10pm.",accent:"British"},
  ],
  Basic:[
    {id:1,title:"Talking About the Weekend",text:"Last weekend was really fun. On Saturday, I went to the park with my family. We had a picnic and played frisbee. On Sunday, I stayed home and cooked pasta for the first time. It was delicious!",accent:"American"},
    {id:2,title:"At the Doctor",text:"I haven't been feeling well lately. I have a sore throat and a slight fever. My doctor told me to rest and drink plenty of fluids. She prescribed some antibiotics and said I should feel better in a few days.",accent:"British"},
  ],
  "Pre-Intermediate":[
    {id:1,title:"Career Plans",text:"I've been thinking a lot about my career lately. I'm currently working as a marketing assistant, but I'd like to move into project management eventually. I've been taking online courses to improve my skills and build my resume.",accent:"American"},
    {id:2,title:"Moving to a New City",text:"Moving to a new city can be both exciting and challenging. You have to find a new apartment, learn your way around, and build a new social network. But it can also be an amazing opportunity to reinvent yourself.",accent:"British"},
  ],
  Intermediate:[
    {id:1,title:"Technology in Daily Life",text:"It's hard to imagine life without technology nowadays. Most people rely on their smartphones for everything — from navigation to entertainment. While this offers incredible convenience, it also raises concerns about privacy, screen time, and our ability to focus deeply.",accent:"British"},
    {id:2,title:"The Psychology of Habits",text:"Habits shape approximately 40% of our daily actions. Every habit follows a loop: a cue, a routine, and a reward. Understanding this loop is the first step to changing unwanted behaviors and building better ones deliberately.",accent:"American"},
  ],
};

const READING = {
  Beginner:[{id:1,title:"My Family",text:"I have a small family. My father's name is Carlos. My mother's name is Maria. I have one brother. His name is Pedro. We live in São Paulo. We like to eat together on Sundays. My mother cooks very well. Her food is delicious.",questions:["How many people are in the family?","Where do they live?","What do they like to do on Sundays?"]}],
  Basic:[{id:1,title:"A Trip to the Beach",text:"Last summer, my family and I went to the beach. We drove for two hours to get there. The water was warm and the sand was white. We built sandcastles and swam in the ocean. At night, we ate fresh seafood at a local restaurant. It was one of the best days of my life.",questions:["How long did it take to get to the beach?","What did they do at the beach?","What did they eat at night?"]}],
  "Pre-Intermediate":[{id:1,title:"Remote Work Revolution",text:"The pandemic changed the way millions of people work. Many companies shifted to remote work almost overnight. While some employees struggled with isolation and blurred work-life boundaries, others found they were more productive at home. Now, most companies offer some form of hybrid model.",questions:["What changed work habits globally?","What were some challenges of remote work?","What model do most companies use now?"]}],
  Intermediate:[{id:1,title:"The Psychology of Habits",text:"Habits shape approximately 40% of our daily actions. According to research by MIT, every habit follows a three-step loop: a cue, a routine, and a reward. Understanding this loop is the first step to changing unwanted behaviors. The cue triggers the brain to enter automatic mode. The routine is the behavior itself. The reward tells the brain whether this loop is worth repeating.",questions:["What percentage of actions are habits?","What are the three steps of the habit loop?","What does the reward do in this process?"]}],
};

const SPEAKING_PROMPTS = [
  "Describe your typical morning routine.",
  "What did you do last weekend?",
  "Talk about your favorite food and why you like it.",
  "Describe the city or neighborhood you live in.",
  "What are your plans for your next vacation?",
  "Talk about someone you admire and why.",
  "What is the biggest challenge in your life right now?",
  "Describe your job or studies.",
  "What do you usually do to relax after a long day?",
  "Talk about a movie or book you enjoyed recently.",
];

const TABS = [
  {id:"dashboard", icon:"⊞", label:"Dashboard"},
  {id:"listening",  icon:"◎", label:"Listening"},
  {id:"speaking",   icon:"◈", label:"Speaking"},
  {id:"reading",    icon:"≡", label:"Reading"},
  {id:"vocabulary", icon:"⊟", label:"Vocabulary"},
  {id:"review",     icon:"↻", label:"Review"},
  {id:"ai",         icon:"✦", label:"AI Coach"},
];

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let state = {
  level: "Beginner",
  streak: 7,
  totalDays: 14,
  xp: 420,
  mission: {listening:false,reading:false,speaking:false,vocabulary:false},
  vocabProgress: {},
  scores: {listening:65,speaking:45,reading:70,vocabulary:55},
  aiHistory: [],
  cardIdx: 0,
  cardFlipped: false,
  todayPrompt: SPEAKING_PROMPTS[Math.floor(Math.random()*SPEAKING_PROMPTS.length)],
  activeTab: "dashboard",
  selListening: null,
  lisChecks: {heard:false,repeated:false,understood:false},
  selReading: null,
  readAnswers: {},
  readDone: false,
  speakText: "",
  speakDone: false,
  aiInput: "",
  aiLoading: false,
  // voice
  isRecording: false,
  isSpeaking: false,
  recognition: null,
  synth: window.speechSynthesis || null,
};

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
const $ = id => document.getElementById(id);
const lvlItems = () => LISTENING[state.level] || [];
const rdItems  = () => READING[state.level]   || [];
const globalPct = () => Math.round((state.totalDays/365)*100);
const missionCount = () => Object.values(state.mission).filter(Boolean).length;
const reviewItems  = () => VOCAB.filter(v => state.vocabProgress[v.id]==="review");
const currentCard  = () => VOCAB[state.cardIdx];

function completeTask(task){
  if(state.mission[task]) return;
  state.mission[task] = true;
  state.xp += 25;
  state.scores[task] = Math.min(100, state.scores[task]+3);
  $("xpVal").textContent = state.xp;
}

// ═══════════════════════════════════════════
//  WEB SPEECH API — VOICE
// ═══════════════════════════════════════════
function initSpeechRecognition(onResult, onEnd){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return null;
  const r = new SR();
  r.lang = "en-US";
  r.continuous = false;
  r.interimResults = false;
  r.onresult = e => {
    const txt = Array.from(e.results).map(r=>r[0].transcript).join(" ");
    onResult(txt);
  };
  r.onend = () => onEnd();
  r.onerror = () => onEnd();
  return r;
}

function speakText(text){
  if(!state.synth) return;
  state.synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = "en-US";
  utt.rate = 0.88;
  utt.pitch = 1;
  // prefer a natural voice
  const voices = state.synth.getVoices();
  const preferred = voices.find(v=>v.lang==="en-US" && v.name.includes("Google"))
    || voices.find(v=>v.lang==="en-US")
    || voices[0];
  if(preferred) utt.voice = preferred;
  utt.onstart = () => { state.isSpeaking=true; renderVoiceBtns(); };
  utt.onend   = () => { state.isSpeaking=false; renderVoiceBtns(); };
  state.synth.speak(utt);
}

function renderVoiceBtns(){
  document.querySelectorAll(".voice-btn").forEach(b=>{
    if(b.dataset.role==="speak"){
      b.className = "voice-btn " + (state.isSpeaking?"speaking":"idle");
      b.title = state.isSpeaking ? "Falando..." : "Ouvir em voz alta";
    }
    if(b.dataset.role==="record"){
      b.className = "voice-btn " + (state.isRecording?"recording":"idle");
      b.title = state.isRecording ? "Parar gravação" : "Falar em inglês";
    }
  });
}

// ═══════════════════════════════════════════
//  GROQ API CALL (via Netlify function)
// ═══════════════════════════════════════════
async function callAI(messages){
  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({messages, level: state.level}),
  });
  const data = await res.json();
  if(!res.ok || data.error) throw new Error(data.error || "API error");
  return data.reply;
}

function toggleSpeakRecording(){
  if(state.isRecording){
    if(state.recognition) state.recognition.stop();
    state.isRecording = false;
    renderVoiceBtns();
    return;
  }
  const ta = $("speakTextarea");
  state.recognition = initSpeechRecognition(
    (txt)=>{ ta.value += (ta.value?" ":"")+txt; state.speakText = ta.value; $("voiceStatus").textContent = "✓ Texto capturado! Continue falando ou edite."; },
    ()=>{ state.isRecording=false; renderVoiceBtns(); $("voiceStatus").textContent = "Gravação encerrada. Clique no microfone para gravar novamente."; }
  );
  if(!state.recognition) return;
  state.isRecording = true;
  $("voiceStatus").textContent = "🔴 Gravando... fale em inglês";
  state.recognition.start();
  renderVoiceBtns();
}

function submitSpeaking(){
  const ta = $("speakTextarea");
  state.speakText = ta ? ta.value : state.speakText;
  if(state.speakText.trim().length < 10){ alert("Escreva pelo menos 2-3 frases em inglês!"); return; }
  state.speakDone = true;
  completeTask("speaking");
  render();
}

function sendSpeakingToAI(){
  const ta = $("speakTextarea");
  state.speakText = ta ? ta.value : state.speakText;
  if(state.speakText.trim().length < 5){ alert("Escreva algo primeiro!"); return; }
  state.aiInput = `Please correct and improve my speaking answer to the prompt "${state.todayPrompt}":\n\n"${state.speakText}"`;
  state.speakDone = true;
  completeTask("speaking");
  state.activeTab = "ai";
  render();
  sendAIMessage();
}

function sendChunkToAI(chunk){
  state.aiInput = `I want to practice using the phrase: "${chunk}". Can you give me a short exercise and then ask me to use it in a sentence?`;
  state.activeTab = "ai";
  render();
  sendAIMessage();
}

      <div class="bubble ${m.role==="user"?"bubble-user":"bubble-ai"}">${escHtml(m.content)}</div>
    </div>`).join("")}

</div>

    oninput="state.aiInput=this.value">${escHtml(state.aiInput)}</textarea>
  <button class="voice-btn idle" id="aiRecordBtn" data-role="record" onclick="toggleAIRecording()" title="Falar em inglês" style="${!(window.SpeechRecognition||window.webkitSpeechRecognition)?'display:none':''}">🎤</button>
  <button class="btn btn-primary" onclick="sendAIMessage()" style="align-self:flex-end;min-width:72px;justify-content:center" ${state.aiLoading?"disabled":""}>
    ${state.aiLoading?"...":"Enviar ✦"}
  </button>
</div>
<p style="font-size:11px;color:#444;margin-top:5px">Enter para enviar · Shift+Enter para nova linha</p>`;

function escHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function setAIInput(txt){
  state.aiInput = txt;
  state.activeTab = "ai";
  render();
  const ta = $("aiTextarea");
  if(ta){ ta.value = txt; ta.focus(); }
}

function scrollChatBottom(){
  setTimeout(()=>{
    const ca = $("chatArea");
    if(ca) ca.scrollTop = ca.scrollHeight;
  }, 50);
}

async function sendAIMessage(){
  const ta = $("aiTextarea");
  const msg = (ta ? ta.value : state.aiInput).trim();
  if(!msg || state.aiLoading) return;
  state.aiInput = "";
  state.aiLoading = true;
  state.aiHistory.push({role:"user", content:msg});
  render();
  scrollChatBottom();
  try {
    const reply = await callAI(state.aiHistory.slice(-12));
    state.aiHistory.push({role:"assistant", content:reply});
  } catch(e) {
    state.aiHistory.push({role:"assistant", content:"❌ Erro de conexão. Verifique se o servidor está rodando e tente novamente.\n\nDetalhes: "+e.message});
  }
  state.aiLoading = false;
  render();
  scrollChatBottom();
}

function toggleAIRecording(){
  if(state.isRecording){
    if(state.recognition) state.recognition.stop();
    state.isRecording = false;
    renderVoiceBtns();
    return;
  }
  state.recognition = initSpeechRecognition(
    (txt)=>{
      state.aiInput += (state.aiInput?" ":"")+txt;
      const ta = $("aiTextarea");
      if(ta) ta.value = state.aiInput;
    },
    ()=>{ state.isRecording=false; renderVoiceBtns(); }
  );
  if(!state.recognition) return;
  state.isRecording = true;
  state.recognition.start();
  renderVoiceBtns();
}

// ═══════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════
$("levelSelect").addEventListener("change", e=>{
  state.level = e.target.value;
  state.selListening = null;
  state.selReading = null;
  render();
});

// preload voices
if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged = ()=>{ window.speechSynthesis.getVoices(); };
  window.speechSynthesis.getVoices();
}

// initial render
render();
</script>
</body>
</html>
